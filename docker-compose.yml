version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root ./artifacts
        --host 0.0.0.0
    volumes:
      - ./mlflow_store:/mlflow

